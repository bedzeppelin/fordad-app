name: Push notification cron

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Call /api/push/cron
        run: |
          curl -fsS -X GET "${{ vars.APP_URL }}/api/push/cron" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
